<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebSocket Connection Test</title>
    <style>
        body {
            font-family: monospace;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: #1a1a1a;
            color: #00ff00;
        }
        h1 { color: #00ff00; }
        .status {
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #00ff00;
            border-radius: 4px;
        }
        .error { color: #ff0000; border-color: #ff0000; }
        .success { color: #00ff00; border-color: #00ff00; }
        .warning { color: #ffaa00; border-color: #ffaa00; }
        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            background: #2a2a2a;
            color: #00ff00;
            border: 1px solid #00ff00;
            font-family: monospace;
        }
        button {
            padding: 10px 20px;
            background: #00ff00;
            color: #1a1a1a;
            border: none;
            cursor: pointer;
            font-family: monospace;
            font-weight: bold;
        }
        button:hover { background: #00dd00; }
        button:disabled {
            background: #555;
            color: #888;
            cursor: not-allowed;
        }
        #log {
            background: #000;
            padding: 15px;
            margin: 20px 0;
            border: 1px solid #00ff00;
            height: 300px;
            overflow-y: auto;
            font-size: 12px;
        }
        .log-entry {
            margin: 5px 0;
            padding: 3px 0;
            border-bottom: 1px solid #333;
        }
        .timestamp { color: #666; }
        .log-error { color: #ff0000; }
        .log-success { color: #00ff00; }
        .log-info { color: #00aaff; }
    </style>
</head>
<body>
    <h1>🔌 WebSocket Connection Tester</h1>

    <div id="status" class="status warning">
        Status: Not connected
    </div>

    <div>
        <label for="endpoint">WebSocket Endpoint:</label>
        <input
            type="text"
            id="endpoint"
            placeholder="wss://xxxxx.execute-api.us-east-1.amazonaws.com/dev"
            value="wss://i70vxb86c4.execute-api.us-east-1.amazonaws.com/dev"
        />
    </div>

    <button id="connectBtn" onclick="connect()">Connect</button>
    <button id="disconnectBtn" onclick="disconnect()" disabled>Disconnect</button>
    <button onclick="clearLog()">Clear Log</button>

    <h2>Test Message</h2>
    <input
        type="text"
        id="message"
        placeholder='{"action":"chat","message":"Hello"}'
        value='{"action":"chat","message":"Hello"}'
    />
    <button id="sendBtn" onclick="sendMessage()" disabled>Send Message</button>

    <h2>Connection Log</h2>
    <div id="log"></div>

    <script>
        let ws = null;

        function log(message, type = 'info') {
            const logDiv = document.getElementById('log');
            const timestamp = new Date().toLocaleTimeString();
            const entry = document.createElement('div');
            entry.className = `log-entry log-${type}`;
            entry.innerHTML = `<span class="timestamp">[${timestamp}]</span> ${message}`;
            logDiv.appendChild(entry);
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        function updateStatus(message, type) {
            const statusDiv = document.getElementById('status');
            statusDiv.textContent = 'Status: ' + message;
            statusDiv.className = 'status ' + type;
        }

        function connect() {
            const endpoint = document.getElementById('endpoint').value.trim();

            if (!endpoint) {
                alert('Please enter a WebSocket endpoint');
                return;
            }

            log(`Connecting to: ${endpoint}`, 'info');
            updateStatus('Connecting...', 'warning');

            try {
                ws = new WebSocket(endpoint);

                ws.onopen = function() {
                    log('✅ WebSocket CONNECTED', 'success');
                    updateStatus('Connected', 'success');
                    document.getElementById('connectBtn').disabled = true;
                    document.getElementById('disconnectBtn').disabled = false;
                    document.getElementById('sendBtn').disabled = false;
                };

                ws.onmessage = function(event) {
                    log(`📥 Received: ${event.data}`, 'success');
                    try {
                        const data = JSON.parse(event.data);
                        log(`   Type: ${data.type}`, 'info');
                        if (data.text) log(`   Text: ${data.text}`, 'info');
                        if (data.error) log(`   Error: ${data.error}`, 'error');
                    } catch (e) {
                        // Not JSON, that's okay
                    }
                };

                ws.onerror = function(error) {
                    log('❌ WebSocket ERROR: ' + error, 'error');
                    log('   This usually means:', 'error');
                    log('   1. Wrong endpoint URL', 'error');
                    log('   2. Backend not deployed', 'error');
                    log('   3. API Gateway not configured', 'error');
                    updateStatus('Error', 'error');
                };

                ws.onclose = function(event) {
                    log(`🔌 WebSocket CLOSED (Code: ${event.code})`, 'warning');
                    if (event.code === 1006) {
                        log('   Code 1006 = Abnormal closure (check endpoint URL)', 'error');
                    }
                    updateStatus('Disconnected', 'warning');
                    document.getElementById('connectBtn').disabled = false;
                    document.getElementById('disconnectBtn').disabled = true;
                    document.getElementById('sendBtn').disabled = true;
                };

            } catch (e) {
                log('❌ Failed to create WebSocket: ' + e.message, 'error');
                updateStatus('Error', 'error');
            }
        }

        function disconnect() {
            if (ws) {
                ws.close();
                ws = null;
                log('Disconnected manually', 'info');
            }
        }

        function sendMessage() {
            const message = document.getElementById('message').value.trim();

            if (!message) {
                alert('Please enter a message');
                return;
            }

            if (!ws || ws.readyState !== WebSocket.OPEN) {
                alert('Not connected');
                return;
            }

            try {
                ws.send(message);
                log(`📤 Sent: ${message}`, 'info');
            } catch (e) {
                log('❌ Failed to send: ' + e.message, 'error');
            }
        }

        function clearLog() {
            document.getElementById('log').innerHTML = '';
            log('Log cleared', 'info');
        }

        // Log initial info
        log('WebSocket Tester Ready', 'info');
        log('Enter your WebSocket endpoint and click Connect', 'info');
    </script>
</body>
</html>
